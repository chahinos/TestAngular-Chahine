<nav class="navbar">
  <div class="nav-brand">
    <span class="brand-icon">🏫</span>
    <span class="brand-name">AtelierApp</span>
  </div>
  <div class="nav-links">
    <a routerLink="/list" routerLinkActive="active" class="nav-link">
      <span class="nav-icon">📋</span> Mes Ateliers

    <a routerLink="/add" routerLinkActive="active" class="nav-link nav-link--cta">

<main class="main-content">
  <router-outlet></router-outlet>

<!-- Hero affiché uniquement sur la page d'accueil -->
<ng-container *ngIf="isHome">
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-badge">🏫 Gestion des Ateliers</div>
      <h1 class="hero-title">Organisez vos<br><span class="hero-highlight">ateliers</span></h1>
      <p class="hero-subtitle">Gérez, suivez et organisez tous vos ateliers en un seul endroit.</p>
      <div class="hero-actions">
        <a routerLink="/add" class="btn btn-primary">＋ Ajouter un atelier</a>
        <a routerLink="/list" class="btn btn-secondary">Voir la liste →</a>
      </div>
    </div>
    <div class="hero-visual">
      <div class="card-float card-1">🎨 Atelier Peinture<br><small>Participants: 12</small></div>
      <div class="card-float card-2">💻 Atelier Coding<br><small>Actif ✅</small></div>
      <div class="card-float card-3">📸 Atelier Photo<br><</div>
    </div>
  </section>
</ng-container>
